<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PhtonView - Android 相机遥控</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: #f5f7fa;
            color: #2c3e50;
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }
        .container {
            max-width: 640px;
            text-align: center;
        }
        .logo {
            width: 96px;
            height: 96px;
            background: #5a7d9a;
            border-radius: 24px;
            margin: 0 auto 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 48px;
        }
        h1 {
            font-size: 2.5rem;
            margin-bottom: 12px;
            color: #34495e;
        }
        p {
            font-size: 1.1rem;
            color: #5a6c7d;
            margin-bottom: 32px;
        }
        .btn {
            display: inline-block;
            background: #5a7d9a;
            color: #fff;
            text-decoration: none;
            padding: 14px 32px;
            border-radius: 8px;
            font-size: 1rem;
            transition: background 0.2s;
            margin: 8px;
        }
        .btn:hover { background: #46627a; }
        .btn-outline {
            background: transparent;
            color: #5a7d9a;
            border: 2px solid #5a7d9a;
        }
        .btn-outline:hover {
            background: #5a7d9a;
            color: #fff;
        }
        footer {
            margin-top: 48px;
            font-size: 0.9rem;
            color: #8a9ba8;
        }
        footer a { color: #5a7d9a; text-decoration: none; }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">PV</div>
        <h1>PhtonView</h1>
        <p>通过 USB OTG 或 WiFi 远程控制单反 / 无反相机的 Android 应用。<br>实时取景、参数调节、多种拍摄模式，尽在掌握。</p>
        <a class="btn" href="https://github.com/lanche-furry/PhtonView/releases/latest">下载最新版本</a>
        <a class="btn btn-outline" href="https://github.com/lanche-furry/PhtonView">查看源码</a>
        <footer>
            <p>MIT License · 2026 <a href="https://github.com/lanche-furry">lanche-furry</a></p>
        </footer>
    </div>
</body>
</html>
